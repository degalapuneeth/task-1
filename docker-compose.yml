services:

  nginx:
    build: ./nginx
    container_name: nginx_lb
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: login_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: